name: "bumper"
description: "Catch dangerous Terraform changes before apply — uploads SARIF to code scanning and posts a sticky PR comment."
branding:
  icon: "shield"
  color: "orange"

inputs:
  plan-json:
    description: "Path to the Terraform plan JSON (produce it with `terraform show -json plan.tfplan > plan.json`)."
    required: true
  fail-severity:
    description: "Fail the job when any finding is at or above this severity (info|low|medium|high|critical), or 'none' to never fail."
    required: false
    default: "high"
  min-severity:
    description: "Lowest severity to include in the SARIF upload and PR comment."
    required: false
    default: "low"
  upload-sarif:
    description: "Upload SARIF to GitHub code scanning (needs security-events: write)."
    required: false
    default: "true"
  comment:
    description: "Post/update a sticky PR comment (needs pull-requests: write)."
    required: false
    default: "true"
  bumper-version:
    description: "Version (git ref or module version) of bumper to install."
    required: false
    default: "latest"
  working-directory:
    description: "Directory the plan-json path is relative to."
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.26"

    - name: Install bumper
      shell: bash
      run: go install github.com/gnana097/bumper/cmd/bumper@${{ inputs.bumper-version }}

    - name: Run bumper (SARIF)
      id: sarif
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        bumper --format sarif --no-fail --min-severity "${{ inputs.min-severity }}" \
          "${{ inputs.plan-json }}" > "${RUNNER_TEMP}/bumper.sarif"
        echo "file=${RUNNER_TEMP}/bumper.sarif" >> "$GITHUB_OUTPUT"

    - name: Upload SARIF to code scanning
      if: ${{ inputs.upload-sarif == 'true' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.sarif.outputs.file }}
        category: bumper

    - name: Render PR comment
      id: md
      if: ${{ inputs.comment == 'true' && github.event_name == 'pull_request' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        bumper --format markdown --no-fail --min-severity "${{ inputs.min-severity }}" \
          "${{ inputs.plan-json }}" > "${RUNNER_TEMP}/bumper.md"
        echo "file=${RUNNER_TEMP}/bumper.md" >> "$GITHUB_OUTPUT"

    - name: Upsert sticky PR comment
      if: ${{ inputs.comment == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      env:
        BUMPER_MD: ${{ steps.md.outputs.file }}
      with:
        script: |
          const fs = require('fs');
          const body = fs.readFileSync(process.env.BUMPER_MD, 'utf8');
          const marker = '<!-- bumper -->';
          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;
          // Find a previous bumper comment by its hidden marker and update it in
          // place, so re-runs replace one comment instead of spamming the PR.
          const comments = await github.paginate(github.rest.issues.listComments, {
            owner, repo, issue_number, per_page: 100,
          });
          const existing = comments.find(c => c.body && c.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
          } else {
            await github.rest.issues.createComment({ owner, repo, issue_number, body });
          }

    - name: Severity gate
      if: ${{ inputs.fail-severity != 'none' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: bumper --min-severity "${{ inputs.fail-severity }}" "${{ inputs.plan-json }}"
