name: release

on:
  push:
    # Full semver tags only (v1.2.3, v1.2.3-rc.1). The floating major tag `v1`
    # — maintained by major-tag.yml so `uses: gnana997/bumper@v1` resolves — has
    # no dots, so it never triggers a (spurious) release.
    tags: ["v*.*.*"]

permissions:
  contents: write # create the GitHub Release
  id-token: write # keyless cosign signing + provenance via GitHub OIDC
  attestations: write # SLSA build-provenance attestation

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so the changelog can be built

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: sigstore/cosign-installer@v3 # keyless signing
      - uses: anchore/sbom-action/download-syft@v0 # SBOM generation

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # A PAT with `contents:write` on gnana997/homebrew-tap (repo scope).
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      # SLSA build provenance — a signed attestation binding each artifact to
      # this exact workflow run, verifiable with `gh attestation verify`.
      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*.tar.gz
            dist/checksums.txt
